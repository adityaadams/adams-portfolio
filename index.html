<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Adams Portfolio</title>
    
    <!-- Font Preloading -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Critical CSS inline untuk render awal -->
    <style>
      body {
        margin: 0;
        background-color: #F8F7F4;
        font-family: "Bricolage Grotesque", sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      .hero-text {
        font-size: clamp(4rem, 20vw, 12rem);
        line-height: 0.75;
      }
    </style>
    
    <!-- Optimasi Bricolage Grotesque - non-blocking -->
    <link 
      rel="preload"
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&display=swap"
      as="style"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&display=swap">
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
